<script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getAuth, GoogleAuthProvider, onAuthStateChanged, signOut, signInWithPopup } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, getDocs, query, where, runTransaction, orderBy, limit, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyADaKwc0YIOKWeP01mgmjkhufqbdeqK3ok",
            authDomain: "calendario-jornaleiro.firebaseapp.com",
            projectId: "calendario-jornaleiro",
            storageBucket: "calendario-jornaleiro.firebasestorage.app",
            messagingSenderId: "583164454011",
            appId: "1:583164454011:web:4e4073c9d50847fcc32ede"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        const DATA_INICIO = new Date(2026, 4, 16, 22, 0, 0);
        const DIAS_TOTAIS = 384;
        
        let usuarioAtual = null;
        let usuarioNickname = null;

        const splashScreen = document.getElementById('splashScreen');
        const appScreen = document.getElementById('appScreen');
        const userNicknameSpan = document.getElementById('userNickname');
        const userEmailSpan = document.getElementById('userEmail');
        const calendarDiv = document.getElementById('calendar');
        
        const totalParticipantesSpan = document.getElementById('totalParticipantes');
        const totalMarcacoesSpan = document.getElementById('totalMarcacoes');
        const mediaPorPessoaSpan = document.getElementById('mediaPorPessoa');
        const diasDecorridosSpan = document.getElementById('diasDecorridos');
        const diasRestantesSpan = document.getElementById('diasRestantes');
        const progressoJornadaFill = document.getElementById('progressoJornadaFill');
        const percentualJornadaSpan = document.getElementById('percentualJornada');
        const hojeMarcaramSpan = document.getElementById('hojeMarcaram');
        const topDiasDiv = document.getElementById('topDias');

        function calcularDiasJornada() {
            const hoje = new Date();
            const diffTime = hoje - DATA_INICIO;
            const diasDecorridos = Math.max(0, Math.floor(diffTime / (1000 * 60 * 60 * 24)));
            const diasRestantes = Math.max(0, DIAS_TOTAIS - diasDecorridos);
            const percentual = Math.min(100, (diasDecorridos / DIAS_TOTAIS) * 100);
            return { diasDecorridos, diasRestantes, percentual };
        }

        // ========== LOGIN COM POPUP ==========
        window.loginComGoogle = async () => {
            try {
                const result = await signInWithPopup(auth, provider);
                const user = result.user;
                const userDocRef = doc(db, 'usuarios', user.uid);
                const docSnap = await getDoc(userDocRef);
                
                if (!docSnap.exists()) {
                    let nickname = prompt('✨ Escolha um NICKNAME público (ex: LeãoDeJudá, Serva, Vigia):', 'Jornaleiro');
                    while (!nickname || nickname.trim() === '') {
                        nickname = prompt('Nickname não pode ficar vazio:');
                    }
                    await setDoc(userDocRef, { email: user.email, nickname: nickname, createdAt: new Date().toISOString() });
                    alert(`✅ Bem-vindo, ${nickname}!`);
                } else {
                    alert(`✅ Bem-vindo de volta, ${docSnap.data().nickname}!`);
                }
            } catch (error) {
                if (error.code === 'auth/popup-blocked') {
                    alert('⚠️ O navegador bloqueou a janela de login. Clique no ícone de pop-up bloqueado na barra de endereço e permita para este site, ou desative o bloqueador de pop-ups.');
                } else {
                    alert('Erro: ' + error.message);
                }
            }
        };

        window.logout = async () => { await signOut(auth); };

        window.marcarDia = async (dataStr, buttonElement) => {
            if (!usuarioAtual) return;
            
            const diaRef = doc(db, 'dias', dataStr);
            const userMarcouRef = doc(db, 'marcacoes_usuarios', `${usuarioAtual.uid}_${dataStr}`);
            const userMarcouSnap = await getDoc(userMarcouRef);
            
            if (userMarcouSnap.exists()) {
                await runTransaction(db, async (transaction) => {
                    const diaDoc = await transaction.get(diaRef);
                    const novoTotal = (diaDoc.data()?.total || 1) - 1;
                    if (novoTotal <= 0) { transaction.delete(diaRef); }
                    else { transaction.set(diaRef, { total: novoTotal, data: dataStr }, { merge: true }); }
                    transaction.delete(userMarcouRef);
                });
                buttonElement.classList.remove('marked');
                buttonElement.style.background = '#fef9f0';
                buttonElement.style.color = '#1e2a2e';
            } else {
                await runTransaction(db, async (transaction) => {
                    const diaDoc = await transaction.get(diaRef);
                    const novoTotal = (diaDoc.data()?.total || 0) + 1;
                    transaction.set(diaRef, { total: novoTotal, data: dataStr }, { merge: true });
                    transaction.set(userMarcouRef, { uid: usuarioAtual.uid, data: dataStr });
                });
                buttonElement.classList.add('marked');
                buttonElement.style.background = '#b45309';
                buttonElement.style.color = 'white';
            }
            await carregarTodasEstatisticas();
            await atualizarContadoresCalendario();
        };

        async function carregarTodasEstatisticas() {
            const usuariosSnapshot = await getDocs(collection(db, 'usuarios'));
            const totalUsuarios = usuariosSnapshot.size;
            totalParticipantesSpan.textContent = totalUsuarios;
            
            const diasSnapshot = await getDocs(collection(db, 'dias'));
            let totalMarcacoes = 0;
            diasSnapshot.forEach(doc => { totalMarcacoes += doc.data().total || 0; });
            totalMarcacoesSpan.textContent = totalMarcacoes;
            
            const media = totalUsuarios > 0 ? (totalMarcacoes / totalUsuarios).toFixed(1) : 0;
            mediaPorPessoaSpan.textContent = media;
            
            const { diasDecorridos, diasRestantes, percentual } = calcularDiasJornada();
            diasDecorridosSpan.textContent = diasDecorridos;
            diasRestantesSpan.textContent = diasRestantes;
            progressoJornadaFill.style.width = percentual + '%';
            percentualJornadaSpan.textContent = Math.floor(percentual);
            
            const hoje = new Date().toISOString().split('T')[0];
            const hojeDoc = await getDoc(doc(db, 'dias', hoje));
            const marcaramHoje = hojeDoc.data()?.total || 0;
            hojeMarcaramSpan.textContent = marcaramHoje;
            
            const q = query(collection(db, 'dias'), orderBy('total', 'desc'), limit(5));
            const topSnapshot = await getDocs(q);
            topDiasDiv.innerHTML = '';
            if (topSnapshot.empty) {
                topDiasDiv.innerHTML = '<div style="color: #6c6f6b;">Nenhum dia marcado ainda.</div>';
            } else {
                topSnapshot.forEach(doc => {
                    const data = doc.id;
                    const total = doc.data().total;
                    const div = document.createElement('div');
                    div.style.cssText = 'display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #f0e7db;';
                    div.innerHTML = `<span>📅 ${formatarDataBr(data)}</span><span style="font-weight: bold; color: #b45309;">🔥 ${total} ${total === 1 ? 'pessoa' : 'pessoas'}</span>`;
                    topDiasDiv.appendChild(div);
                });
            }
        }

        function formatarDataBr(dataStr) {
            const partes = dataStr.split('-');
            return `${partes[2]}/${partes[1]}/${partes[0]}`;
        }

        async function atualizarContadoresCalendario() {
            const diasSnapshot = await getDocs(collection(db, 'dias'));
            const contadores = {};
            diasSnapshot.forEach(doc => { contadores[doc.id] = doc.data().total; });
            
            document.querySelectorAll('.day-cell').forEach(cell => {
                const dataStr = cell.getAttribute('data-date');
                const total = contadores[dataStr] || 0;
                let contadorSpan = cell.querySelector('.contador-dia');
                if (!contadorSpan) {
                    contadorSpan = document.createElement('div');
                    contadorSpan.className = 'contador-dia';
                    contadorSpan.style.cssText = 'font-size: 0.6rem; margin-top: 4px;';
                    cell.appendChild(contadorSpan);
                }
                contadorSpan.textContent = total > 0 ? `🔥 ${total}` : '';
            });
        }

        // ==================== MURAL DE ORAÇÕES ====================
        async function carregarComentarios() {
            const area = document.getElementById('areaMensagens');
            if (!area) return;
            
            const q = query(collection(db, 'comentarios'), orderBy('createdAt', 'desc'));
            onSnapshot(q, (snapshot) => {
                area.innerHTML = '';
                if (snapshot.empty) {
                    area.innerHTML = '<div style="text-align:center; padding:20px;">🙏 Nenhuma oração compartilhada ainda. Seja o primeiro.</div>';
                    return;
                }
                snapshot.forEach(doc => {
                    const comentario = doc.data();
                    const div = document.createElement('div');
                    div.style.cssText = 'background: #fff7ed; border-left: 4px solid #b45309; padding: 12px; margin-bottom: 10px; border-radius: 12px;';
                    div.innerHTML = `📝 ${escapeHtml(comentario.texto)}<div style="font-size: 0.6rem; color: #b45309; margin-top: 6px;">${new Date(comentario.createdAt).toLocaleString()}</div>`;
                    area.appendChild(div);
                });
            });
        }

        async function enviarComentario(texto) {
            if (!usuarioAtual) { alert('Faça login para escrever.'); return false; }
            try {
                await addDoc(collection(db, 'comentarios'), { texto: texto.trim(), createdAt: new Date().toISOString() });
                return true;
            } catch (error) {
                alert('Erro ao enviar.');
                return false;
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

                { nome: "JUNHO 2026", dias: 30, inicio: 1, ano: 2026, mesNum: 5, eventos: {} },

            const diasSnapshot = await getDocs(collection(db, 'dias'));

            calendarDiv.innerHTML = '';
            
            for (const mes of meses) {

                header.onclick = () => { const body = monthDiv.querySelector('.month-body'); body.style.display = body.style.display === 'grid' ? 'none' : 'grid'; };
                monthDiv.appendChild(header);
                
                const body = document.createElement('div');

                for (let i = 0; i < mes.inicio; i++) { const empty = document.createElement('div'); body.appendChild(empty); }

                    const usuarioMarcou = marcacoesUsuario.has(dataStr);
                    const evento = mes.eventos[d] || '';
                    
                    const dayDiv = document.createElement('div');
                    dayDiv.className = 'day-cell';
                    dayDiv.setAttribute('data-date', dataStr);
                    
                    let bgColor = '#fef9f0';
                    let textColor = '#1e2a2e';
                    if (usuarioMarcou) { bgColor = '#b45309'; textColor = 'white'; }

                    const dayNumber = document.createElement('div');
                    dayNumber.style.fontWeight = 'bold';
                    dayNumber.style.fontSize = '1rem';
                    dayNumber.textContent = d;
                    dayDiv.appendChild(dayNumber);
                    
                    if (evento) {
                        const eventSpan = document.createElement('div');
                        eventSpan.style.fontSize = '0.55rem';
                        eventSpan.style.marginTop = '4px';
                        eventSpan.textContent = evento;
                        dayDiv.appendChild(eventSpan);
                    }
                    
                    if (total > 0) {
                        const contadorSpan = document.createElement('div');
                        contadorSpan.className = 'contador-dia';
                        contadorSpan.style.cssText = 'font-size: 0.55rem; margin-top: 2px;';
                        contadorSpan.textContent = `🔥 ${total}`;
                        dayDiv.appendChild(contadorSpan);
                    }
                    
                    dayDiv.onclick = (function(ds, el) { return () => marcarDia(ds, el); })(dataStr, dayDiv);
                    body.appendChild(dayDiv);

                monthDiv.appendChild(body);
                calendarDiv.appendChild(monthDiv);
            }
            
            const hoje = new Date();
            const mesAtual = hoje.getMonth();
            const anoAtual = hoje.getFullYear();
            const monthBodies = document.querySelectorAll('.month-body');
            for (let i = 0; i < meses.length; i++) {
                if (meses[i].ano === anoAtual && meses[i].mesNum === mesAtual && monthBodies[i]) { monthBodies[i].style.display = 'grid'; break; }
            }
            if (monthBodies[0] && !document.querySelector('.month-body[style*="grid"]')) { monthBodies[0].style.display = 'grid'; }
        }
